# Nginx config for radar.simpleinc.cloud
#
# Routes the new productization API (port 3002) and the legacy dashboard
# (port 3001) on a single hostname. Place under /etc/nginx/sites-available/
# and symlink to sites-enabled/. Reload with `nginx -t && systemctl reload nginx`.

upstream radar_api_v2 {
    server 127.0.0.1:3002;
    keepalive 16;
}

upstream radar_dashboard {
    server 127.0.0.1:3001;
    keepalive 16;
}

# Map of paths owned by the v2 API. Anything not matching falls through to
# the legacy dashboard which still owns /api/overview, /api/leads, /api/config,
# /api/niches, /api/funnel, /api/send-log, /api/replies, /api/sequences,
# /api/cron-status, /api/health, /api/costs, /api/errors, /api/offer,
# /api/icp-profile, /api/run-engine, /api/engines, /api/saved-views.
#
# v2 paths:
#   /auth/google/*        Google OAuth start + callback + /token
#   /api/auth/*           logout, me, future password reset
#   /api/otp/*            OTP send / verify
#   /api/billing/*        plan portal, create-subscription, cancel, webhook
#   /api/me               account info
#   /graphql              GraphQL HTTP + WS (subscription upgrade)
#   /admin/queues/*       Bull Board (superadmin only)

server {
    listen 80;
    listen [::]:80;
    server_name radar.simpleinc.cloud;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name radar.simpleinc.cloud;

    # ssl_certificate     /etc/letsencrypt/live/radar.simpleinc.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/radar.simpleinc.cloud/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5M;

    # ── v2 API (productization stack) ────────────────────────────────
    location ~ ^/(auth/google|api/auth|api/otp|api/billing|api/me|admin/queues) {
        proxy_pass http://radar_api_v2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # GraphQL needs WebSocket upgrade for subscriptions
    location /graphql {
        proxy_pass http://radar_api_v2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Legacy dashboard (everything else, including the SPA itself) ─
    location / {
        proxy_pass http://radar_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# WebSocket Upgrade map — required by /graphql proxy block above. Place this
# in /etc/nginx/conf.d/websocket.conf or in the http {} block of nginx.conf.
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
